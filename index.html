<div id="notifs"></div>
<div id="evbanner"></div>

<script>

const CROPS = {
  variable:  {name:'Variable', emoji:'📦', sym:'var x',  t:15,  y:8,    cost:3,   color:'#4ade80', rarity:'common',    lv:1,  desc:'let x = valor. O início de tudo.'},
  function:  {name:'Function', emoji:'⚡', sym:'fn()',   t:35,  y:25,   cost:8,   color:'#60a5fa', rarity:'common',    lv:1,  desc:'DRY principle. Lógica reutilizável.'},
  class:     {name:'Class',    emoji:'🏛️', sym:'class{}',t:75,  y:70,   cost:22,  color:'#c084fc', rarity:'uncommon',  lv:3,  desc:'OOP em sua forma mais pura.'},
  api:       {name:'REST API', emoji:'🌐', sym:'GET/',   t:150, y:190,  cost:50,  color:'#fb923c', rarity:'rare',      lv:5,  desc:'Conecta serviços. Status: 200 OK.'},
  algorithm: {name:'Algorithm',emoji:'🧮', sym:'O(n)',   t:240, y:420,  cost:100, color:'#f43f5e', rarity:'rare',      lv:7,  desc:'Big-O matters. Eficiência é tudo.'},
  database:  {name:'Database', emoji:'🗄️', sym:'SQL',    t:400, y:900,  cost:200, color:'#22d3ee', rarity:'epic',      lv:10, desc:'Persistência real. SELECT * FROM life.'},
  ml_model:  {name:'ML Model', emoji:'🤖', sym:'AI()',   t:720, y:2200, cost:500, color:'#a78bfa', rarity:'legendary', lv:15, desc:'model.fit(X,y). Pray to the GPU.'},
};

const UPGRADES = {
  coffee:   {name:'Café Duplo',    emoji:'☕', desc:'+25% velocidade de crescimento por nível',  costs:[80,200,500],  max:3, effect:'speed'},
  linter:   {name:'Linter Pro',    emoji:'🔍', desc:'-40% chance de bugs por nível',             costs:[150,400],     max:2, effect:'bugProtect'},
  gpu:      {name:'GPU Cluster',   emoji:'💻', desc:'+50% yield em todos os crops por nível',    costs:[300,800,2000],max:3, effect:'yieldBoost'},
  network:  {name:'Open Source',   emoji:'🌐', desc:'+25% recompensas dos contratos por nível',  costs:[250,700],     max:2, effect:'contractBoost'},
  ci_cd:    {name:'CI/CD Pipeline',emoji:'🚀', desc:'Auto-harvest quando o crop matura',         costs:[600],         max:1, effect:'autoHarvest'},
  so:       {name:'Stack Overflow',emoji:'📚', desc:'+100% XP ganho de colheitas',               costs:[600],         max:1, effect:'xpBoost'},
  ex6:      {name:'Farm 6×6',      emoji:'📐', desc:'Expande o farm para 36 plots',              costs:[500],         max:1, effect:'expand6'},
  ex7:      {name:'Farm 7×7',      emoji:'🗺️', desc:'Expande o farm para 49 plots',              costs:[1500],        max:1, effect:'expand7'},
};

const EVENTS = [
  {id:'bug',    name:'🐛 Bug Detectado!',     desc:'Um bug apareceu num plot aleatório.',    type:'bad' },
  {id:'review', name:'✅ Code Review OK!',     desc:'Próxima colheita vale 2× tokens!',      type:'good'},
  {id:'deploy', name:'🚀 Deploy Automático!',  desc:'Todos os crops prontos são colhidos!',  type:'good'},
  {id:'outage', name:'💀 Servidor Caiu!',      desc:'Um crop aleatório foi destruído.',       type:'bad' },
  {id:'pr',     name:'🔀 PR Mergeado!',        desc:'Ganhou +80 tokens de bônus!',           type:'good'},
  {id:'refactor',name:'♻️ Big Refactor!',      desc:'Crescimento 2× por 30 segundos!',       type:'good'},
  {id:'hackathon',name:'⚡ Hackathon Mode!',   desc:'+150 tokens e XP 3× por 1 colheita!',  type:'good'},
];

const CONTRACT_POOL = [
  {id:'var_drive',   name:'Variable Sprint',  emoji:'📦', desc:'Colha 15 Variables',                  goal:15, key:'varHarv',    rewardTok:90,  rewardXp:45,  rewardRep:1},
  {id:'bug_hunt',    name:'Bug Hunt',         emoji:'🦟', desc:'Corrija 5 bugs',                     goal:5,  key:'bugsFixed',  rewardTok:110, rewardXp:60,  rewardRep:1},
  {id:'plant_burst', name:'Farm Expansion',   emoji:'🌱', desc:'Faça 30 plantações',                 goal:30, key:'planted',    rewardTok:120, rewardXp:70,  rewardRep:1},
  {id:'token_push',  name:'Deployment Budget',emoji:'💰', desc:'Ganhe 1.200 tokens no total',        goal:1200,key:'earned',     rewardTok:160, rewardXp:90,  rewardRep:2},
  {id:'ship_ready',  name:'Ship It',          emoji:'🎯', desc:'Alcance o nível 12',                 goal:12, key:'level',       rewardTok:180, rewardXp:110, rewardRep:2},
];

const ACHIEVEMENTS = [
  {id:'first',   name:'Hello World',   emoji:'👋', desc:'Faça sua primeira colheita',              chk:s=>s.stats.harvested>=1},
  {id:'rich',    name:'Senior Dev',    emoji:'💰', desc:'Ganhe 1.000 tokens no total',             chk:s=>s.stats.earned>=1000},
  {id:'full',    name:'Full Stack',    emoji:'🌾', desc:'Plante em todos os plots simultaneamente', chk:s=>s.plots.filter(p=>p.state!='empty').length>=s.farmSize},
  {id:'debug',   name:'Exterminador',  emoji:'🦟', desc:'Corrija 10 bugs',                         chk:s=>s.stats.bugsFixed>=10},
  {id:'aieng',   name:'AI Engineer',   emoji:'🤖', desc:'Colha seu primeiro ML Model',             chk:s=>s.stats.mlHarv>=1},
  {id:'lv20',    name:'Ship It!',      emoji:'🎯', desc:'Alcance o nível 20',                      chk:s=>s.level>=20},
  {id:'hoarder', name:'Token Hoarder', emoji:'🏦', desc:'Tenha 5.000 tokens simultâneos',          chk:s=>s.tokens>=5000},
  {id:'speedrun',name:'Speedrunner',   emoji:'⚡', desc:'Colha 50 Variables',                      chk:s=>s.stats.varHarv>=50},
  {id:'hackwon', name:'Hackathon Win', emoji:'🏆', desc:'Benefício do Hackathon ativado',          chk:s=>s.stats.hackathons>=1},
  {id:'contractor', name:'Contractor',  emoji:'📋', desc:'Complete 5 contratos',                    chk:s=>s.stats.contractsClaimed>=5},
];

const mkPlot = () => ({state:'empty',crop:null,plantedAt:null,progress:0});
const mkState = () => ({
  tokens:20, level:1, xp:0, xpToNext:50,
  farmSize:25, farmCols:5,
  selectedCrop:'variable',
  activeTab:'shop',
  upgrades:{coffee:0,linter:0,gpu:0,ci_cd:0,so:0,ex6:0,ex7:0},
  inv:{variable:5,function:0,class:0,api:0,algorithm:0,database:0,ml_model:0},
  plots:Array.from({length:25},mkPlot),
  reviewBonus:false,
  hackathonBonus:false,
  refactorUntil:0,
  nextEvent:Date.now()+40000,
  reputation:0,
  contractDay:'',
  contracts:[],
  dailyBonusClaimed:false,
  stats:{harvested:0,earned:0,bugsFixed:0,mlHarv:0,varHarv:0,planted:0,hackathons:0,contractsClaimed:0},
  achievements:[],
});

let G = mkState();

const speedMult = () => {
  let m = 1 + G.upgrades.coffee * 0.25;
  if (Date.now() < G.refactorUntil) m *= 2;
  return m;
};
const yieldMult = () => 1 + G.upgrades.gpu * 0.5;
const reputationMult = () => 1 + Math.min(G.reputation || 0, 20) * 0.02;
const contractRewardMult = () => 1 + G.upgrades.network * 0.25;
const xpMult    = () => G.upgrades.so ? (G.hackathonBonus ? 3 : 2) : (G.hackathonBonus ? 3 : 1);
const bugChance = () => Math.max(0.01, 0.07 - G.upgrades.linter * 0.025);
const autoHarv  = () => G.upgrades.ci_cd >= 1;
const unlocked  = id => G.level >= CROPS[id].lv;
const effTime   = id => Math.max(5, Math.round(CROPS[id].t / speedMult()));
const effYield  = id => {
  let y = Math.round(CROPS[id].y * yieldMult() * reputationMult());
  if (G.reviewBonus) y *= 2;
  if (G.hackathonBonus) y = Math.round(y * 1.5);
  return y;
};

const $ = id => document.getElementById(id);
const fmt = n => n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n);
const fmtT = s => {
  s = Math.max(0, Math.floor(s));
  const m = Math.floor(s/60), sec = s%60;
  return m > 0 ? `${m}m${sec.toString().padStart(2,'0')}s` : `${sec}s`;
};
const setStatus = msg => { $('status-msg').textContent = msg; };

const SAVE_KEY = 'devfarm3:v2';
const SAVE_BACKUP_KEY = 'devfarm3:v2:backup';

let saveTimer = null;

function normalizeState(raw) {
  const base = mkState();
  const state = { ...base, ...(raw || {}) };

  state.tokens = Number.isFinite(state.tokens) ? state.tokens : base.tokens;
  state.level = Number.isFinite(state.level) && state.level >= 1 ? state.level : base.level;
  state.xp = Number.isFinite(state.xp) && state.xp >= 0 ? state.xp : base.xp;
  state.xpToNext = Number.isFinite(state.xpToNext) && state.xpToNext > 0 ? state.xpToNext : base.xpToNext;
  state.farmSize = [25, 36, 49].includes(state.farmSize) ? state.farmSize : base.farmSize;
  state.farmCols = [5, 6, 7].includes(state.farmCols) ? state.farmCols : base.farmCols;
  state.selectedCrop = CROPS[state.selectedCrop] ? state.selectedCrop : base.selectedCrop;
  state.activeTab = ['shop', 'upgrades', 'stats', 'badges'].includes(state.activeTab) ? state.activeTab : base.activeTab;
  state.upgrades = { ...base.upgrades, ...(state.upgrades || {}) };
  state.inv = { ...base.inv, ...(state.inv || {}) };
  state.reputation = Number.isFinite(state.reputation) && state.reputation >= 0 ? state.reputation : base.reputation;
  state.contractDay = typeof state.contractDay === 'string' ? state.contractDay : base.contractDay;
  state.dailyBonusClaimed = !!state.dailyBonusClaimed;
  state.stats = { ...base.stats, ...(state.stats || {}) };
  state.achievements = Array.isArray(state.achievements) ? state.achievements : [];
  state.contracts = Array.isArray(state.contracts) ? state.contracts : [];
  state.stats.contractsClaimed = Number.isFinite(state.stats.contractsClaimed) && state.stats.contractsClaimed >= 0 ? state.stats.contractsClaimed : base.stats.contractsClaimed;
  state.plots = Array.isArray(state.plots) ? state.plots : [];

  state.plots = state.plots.slice(0, state.farmSize).map(plot => {
    const next = { ...mkPlot(), ...(plot || {}) };
    if (!['empty', 'growing', 'ready', 'bugged'].includes(next.state)) return mkPlot();
    if (next.state !== 'empty' && !CROPS[next.crop]) return mkPlot();
    return next;
  });
  while (state.plots.length < state.farmSize) state.plots.push(mkPlot());

  return state;
}

function persistState() {
  const payload = JSON.stringify(G);
  localStorage.setItem(SAVE_KEY, payload);
  localStorage.setItem(SAVE_BACKUP_KEY, payload);
  $('save-status').textContent = 'saved ' + new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

function save() {
  try {
    persistState();
  } catch(e) {}
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveTimer = null;
    save();
  }, 400);
}

function flushSave() {
  if (saveTimer) {
    clearTimeout(saveTimer);
    saveTimer = null;
  }
  save();
}
function load() {
  try {
    const d = localStorage.getItem(SAVE_KEY) || localStorage.getItem(SAVE_BACKUP_KEY);
    if (d) {
      G = normalizeState(JSON.parse(d));
      return;
    }
  } catch(e) {}
  G = mkState();
}

function todayKey() {
  return new Date().toDateString();
}

function hashString(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

function contractValue(contract) {
  return contract.key === 'level' ? G.level : G.stats[contract.key] || 0;
}

function buildDailyContracts(day = todayKey()) {
  const seed = hashString(day);
  const pool = CONTRACT_POOL.map(contract => ({ ...contract }));
  let rng = seed || 1;
  const nextRand = () => {
    rng ^= rng << 13;
    rng ^= rng >>> 17;
    rng ^= rng << 5;
    return (rng >>> 0) / 4294967296;
  };

  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(nextRand() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }

  return pool.slice(0, 3).map(contract => ({
    ...contract,
    progress: Math.min(contract.goal, contractValue(contract)),
    claimed: false,
  }));
}

function ensureDailyContracts(force = false) {
  const day = todayKey();
  if (force || G.contractDay !== day || !Array.isArray(G.contracts) || G.contracts.length !== 3) {
    G.contractDay = day;
    G.contracts = buildDailyContracts(day);
    G.dailyBonusClaimed = false;
  } else {
    G.contracts = G.contracts.map(contract => ({
      ...contract,
      progress: Math.min(contract.goal, contractValue(contract)),
      claimed: !!contract.claimed,
    }));
  }
}

function claimContract(index) {
  ensureDailyContracts();
  const contract = G.contracts[index];
  if (!contract || contract.claimed || contract.progress < contract.goal) return;

  const mult = contractRewardMult();
  const tokens = Math.round(contract.rewardTok * mult);
  const xp = Math.round(contract.rewardXp * mult);
  const rep = Math.max(1, Math.round(contract.rewardRep * mult));

  contract.claimed = true;
  G.tokens += tokens;
  G.stats.earned += tokens;
  G.reputation += rep;
  G.stats.contractsClaimed++;
  addXp(xp);
  notify(`📋 ${contract.name} concluído! +${tokens} 💰`, 'ach');
  renderAll();
  scheduleSave();

  if (!G.dailyBonusClaimed && G.contracts.every(c => c.claimed)) {
    G.dailyBonusClaimed = true;
    G.tokens += 150;
    G.stats.earned += 150;
    G.reputation += 1;
    addXp(100);
    notify('🏁 Conjunto diário concluído! Bônus extra liberado.', 'ok');
    renderAll();
    scheduleSave();
  }
}

function notify(msg, type='info') {
  const c = $('notifs');
  const d = document.createElement('div');
  d.className = `notif n-${type}`;
  d.textContent = msg;
  c.appendChild(d);
  setTimeout(()=>d.remove(), 3100);
  setStatus(msg);
}

function showEvent(ev) {
  const b = $('evbanner');
  b.innerHTML = '';
  const card = document.createElement('div');
  card.className = `evcard e${ev.type}`;
  card.innerHTML = `<div class="ev-ico">${ev.name.split(' ')[0]}</div><div><div class="ev-name">${ev.name}</div><div class="ev-desc">${ev.desc}</div></div>`;
  b.appendChild(card);
  setTimeout(()=>card.remove(), 4100);
}

function particle(el, text) {
  const r = el.getBoundingClientRect();
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `left:${r.left+r.width/2}px;top:${r.top+5}px;color:var(--yellow)`;
  p.textContent = text;
  document.body.appendChild(p);
  setTimeout(()=>p.remove(), 950);
}

function addXp(n) {
  G.xp += n * xpMult();
  while (G.xp >= G.xpToNext) {
    G.xp -= G.xpToNext;
    G.level++;
    G.xpToNext = Math.round(50 * Math.pow(1.45, G.level - 1));
    notify(`🎉 Level up! Lv.${G.level}`, 'ok');
    for (const [id,c] of Object.entries(CROPS)) {
      if (c.lv === G.level) notify(`🔓 Desbloqueado: ${c.emoji} ${c.name}!`, 'info');
    }
  }
}

function checkAch() {
  for (const a of ACHIEVEMENTS) {
    if (!G.achievements.includes(a.id) && a.chk(G)) {
      G.achievements.push(a.id);
      notify(`🏆 "${a.name}" desbloqueada!`, 'ach');
    }
  }
}

function clickPlot(i) {
  const p = G.plots[i];
  const el = document.querySelector(`[data-pi="${i}"]`);
  if (p.state === 'bugged') fixBug(i, el);
  else if (p.state === 'ready') harvest(i, el);
  else if (p.state === 'empty') plant(i);
}

function plant(i) {
  const cid = G.selectedCrop;
  if (!unlocked(cid)) { notify(`🔒 ${CROPS[cid].name} requer Lv.${CROPS[cid].lv}`, 'err'); return; }
  if (!G.inv[cid] || G.inv[cid] <= 0) { notify(`Sem sementes de ${CROPS[cid].name}! Compre na loja.`, 'warn'); return; }
  G.inv[cid]--;
  G.plots[i] = {state:'growing', crop:cid, plantedAt:Date.now(), progress:0};
  G.stats.planted++;
  setStatus(`Plantou ${CROPS[cid].emoji} ${CROPS[cid].name}`);
  scheduleSave();
}

function harvest(i, el) {
  const p = G.plots[i];
  if (!p.crop) return;
  const c = CROPS[p.crop];
  const earned = effYield(p.crop);
  const xpGain = Math.round(c.t / 5);
  G.tokens += earned;
  G.stats.earned += earned;
  G.stats.harvested++;
  if (p.crop === 'ml_model') G.stats.mlHarv++;
  if (p.crop === 'variable') G.stats.varHarv++;
  if (G.reviewBonus) G.reviewBonus = false;
  if (G.hackathonBonus) G.hackathonBonus = false;
  addXp(xpGain);
  G.plots[i] = mkPlot();
  notify(`+${earned} 💰  ${c.emoji} ${c.name}`, 'ok');
  if (el) particle(el, `+${earned}💰`);
  checkAch();
  scheduleSave();
}

function fixBug(i, el) {
  G.plots[i] = mkPlot();
  G.stats.bugsFixed++;
  G.tokens += 5;
  notify('🐛 Bug corrigido! +5 tokens', 'info');
  if (el) particle(el, '🐛 +5💰');
  checkAch();
  scheduleSave();
}

function buySeed(cid) {
  const c = CROPS[cid];
  if (!unlocked(cid)) { notify(`Requer Lv.${c.lv}`, 'err'); return; }
  if (G.tokens < c.cost) { notify(`Tokens insuficientes!`, 'err'); return; }
  G.tokens -= c.cost;
  G.inv[cid] = (G.inv[cid]||0) + 1;
  notify(`Comprou ${c.emoji} ${c.name}!`, 'ok');
  renderAll();
  scheduleSave();
}

function buyUpgrade(uid) {
  const u = UPGRADES[uid];
  const lv = G.upgrades[uid] || 0;
  if (lv >= u.max) { notify('Upgrade já no máximo!', 'warn'); return; }
  const cost = u.costs[lv];
  if (G.tokens < cost) { notify(`Precisa de ${cost} 💰`, 'err'); return; }
  G.tokens -= cost;
  G.upgrades[uid]++;

  if ((u.effect === 'expand6') && G.upgrades[uid] >= u.max) {
    for(let j=G.plots.length;j<36;j++) G.plots.push(mkPlot());
    G.farmSize = 36; G.farmCols = 6;
    notify('📐 Farm expandido para 6×6!', 'ok');
  }
  if ((u.effect === 'expand7') && G.upgrades[uid] >= u.max) {
    for(let j=G.plots.length;j<49;j++) G.plots.push(mkPlot());
    G.farmSize = 49; G.farmCols = 7;
    notify('🗺️ Farm expandido para 7×7!', 'ok');
  }
  notify(`✅ ${u.emoji} ${u.name} atualizado!`, 'ok');
  renderAll();
  scheduleSave();
}

function triggerEvent() {
  const ev = EVENTS[Math.floor(Math.random() * EVENTS.length)];
  applyEvent(ev);
  showEvent(ev);
}

function applyEvent(ev) {
  const growing = G.plots.map((_,i)=>i).filter(i=>G.plots[i].state==='growing');
  const occupied = G.plots.map((_,i)=>i).filter(i=>G.plots[i].state!=='empty');

  switch(ev.id) {
    case 'bug':
      if (growing.length > 0 && Math.random() < bugChance()*6) {
        const idx = growing[Math.floor(Math.random()*growing.length)];
        G.plots[idx].state = 'bugged';
      }
      break;
    case 'review':
      G.reviewBonus = true;
      break;
    case 'deploy':
      G.plots.forEach((p,i) => {
        if(p.state==='ready') harvest(i, document.querySelector(`[data-pi="${i}"]`));
      });
      break;
    case 'outage':
      if (occupied.length > 0) {
        const idx = occupied[Math.floor(Math.random()*occupied.length)];
        G.plots[idx] = mkPlot();
        notify('💀 Servidor caiu! Crop perdido.', 'err');
      }
      break;
    case 'pr':
      G.tokens += 80;
      G.stats.earned += 80;
      break;
    case 'refactor':
      G.refactorUntil = Date.now() + 30000;
      break;
    case 'hackathon':
      G.hackathonBonus = true;
      G.tokens += 150;
      G.stats.earned += 150;
      G.stats.hackathons++;
      break;
  }
  scheduleSave();
}

function renderHeader() {
  $('h-tok').textContent = fmt(G.tokens);
  $('h-rep').textContent = fmt(G.reputation || 0);
  $('h-lv').textContent = G.level;
  $('h-xp').style.width = ((G.xp/G.xpToNext)*100)+'%';
  $('h-xpcur').textContent = fmt(G.xp);
  $('h-xpmax').textContent = fmt(G.xpToNext);

  let buffs = '';
  if (G.reviewBonus) buffs += `<span class="review-badge">✅ 2× review</span>`;
  if (Date.now() < G.refactorUntil) buffs += `<span class="refactor-badge">♻️ refactor ${fmtT((G.refactorUntil-Date.now())/1000)}</span>`;
  if (G.hackathonBonus) buffs += `<span class="review-badge">⚡ hackathon</span>`;
  $('hdr-buffs').innerHTML = buffs;
}

function renderFarm() {
  const grid = $('farm-grid');
  grid.style.gridTemplateColumns = `repeat(${G.farmCols},1fr)`;
  $('farm-label').textContent = `${G.farmCols}×${G.farmCols} plots`;

  if (grid.children.length !== G.farmSize) {
    grid.innerHTML = '';
    for (let i = 0; i < G.farmSize; i++) {
      const d = document.createElement('button');
      d.type = 'button';
      d.className = 'plot empty';
      d.dataset.pi = i;
      d.setAttribute('aria-label', `Plot ${i + 1}`);
      d.onclick = ()=>clickPlot(i);
      grid.appendChild(d);
    }
  }

  const now = Date.now();
  const els = grid.querySelectorAll('.plot');

  els.forEach((el, i) => {
    const p = G.plots[i];
    const c = p.crop ? CROPS[p.crop] : null;

    el.className = 'plot ' + p.state;
    if (c) el.style.setProperty('--pc', c.color);

    if (p.state === 'empty') {
      el.innerHTML = `<div class="pcursor">+</div>`;
      el.style.borderColor = '';
    } else if (p.state === 'growing') {
      const elapsed = (now - p.plantedAt) / 1000;
      const total = effTime(p.crop);
      const prog = Math.min(1, elapsed / total);
      const rem = Math.max(0, total - elapsed);
      el.innerHTML = `
        <div class="pemoji">${c.emoji}</div>
        <div class="psym" style="color:${c.color}">${c.sym}</div>
        <div class="ptime">${fmtT(rem)}</div>
        <div class="pbar"><div class="pbar-fill" style="width:${(prog*100).toFixed(1)}%;background:${c.color}"></div></div>
      `;
    } else if (p.state === 'ready') {
      el.style.borderColor = c.color;
      el.innerHTML = `
        <div class="pemoji">${c.emoji}</div>
        <div class="plabel-ready">COLHER</div>
        <div class="pbar"><div class="pbar-fill" style="width:100%;background:${c.color}"></div></div>
      `;
    } else if (p.state === 'bugged') {
      el.style.borderColor = '';
      el.innerHTML = `<div class="pemoji">🐛</div><div class="plabel-bug">DEBUG!</div>`;
    }
  });
}

function renderSeeds() {
  const grid = $('seed-grid');
  grid.innerHTML = '';
  for (const [id, c] of Object.entries(CROPS)) {
    const locked = !unlocked(id);
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = `sbtn${G.selectedCrop===id?' sactive':''}${locked?' slocked':''}`;
    btn.style.setProperty('--sc', c.color);
    btn.title = c.name;
    btn.setAttribute('aria-label', `${c.name}${locked ? ' bloqueada' : ''}`);
    btn.innerHTML = `<div class="sbtn-emoji">${c.emoji}</div><div class="sbtn-cnt">${locked?'':G.inv[id]||0}</div>${locked?`<div class="sbtn-lock">🔒</div>`:''}`;
    if (!locked) btn.onclick = ()=>{ G.selectedCrop=id; renderSeeds(); };
    grid.appendChild(btn);
  }
  const c = CROPS[G.selectedCrop];
  const lk = !unlocked(G.selectedCrop);
  const rc = {common:'rc',uncommon:'ru',rare:'rr',epic:'re',legendary:'rl'}[c.rarity];
  $('sinfo').innerHTML = `
    <div class="sinfo">
      <div class="sinfo-name" style="color:${c.color}">${c.emoji} ${c.name} <span class="${rc}" style="font-size:9px">[${c.rarity}]</span></div>
      <div class="sinfo-desc">${c.desc}</div>
      ${lk ? `<div style="color:var(--red);font-size:10px">🔒 Requer Lv.${c.lv}</div>` : `
      <div class="sinfo-grid">
        <div class="si">💰 yield: <span>${effYield(G.selectedCrop)}</span></div>
        <div class="si">⏱ tempo: <span>${fmtT(effTime(G.selectedCrop))}</span></div>
        <div class="si">📦 em mãos: <span>${G.inv[G.selectedCrop]||0}</span></div>
        <div class="si">💵 custo: <span>${c.cost} tok</span></div>
      </div>`}
    </div>
  `;
}

function renderTab() {
  const tc = $('tabcontent');
  if (G.activeTab === 'shop') {
    let h = `<div class="tc-label">// seeds.buy()</div>`;
    for (const [id,c] of Object.entries(CROPS)) {
      const lk = !unlocked(id);
      const ok = G.tokens >= c.cost && !lk;
      h += `<button type="button" class="shopitem${ok?'':' sdisabled'}" onclick="buySeed('${id}')">
        <div class="si-emoji">${c.emoji}</div>
        <div class="si-info">
          <div class="si-name" style="color:${c.color}">${c.name}</div>
          <div class="si-desc">${lk?`🔒 Desbloqueia no Lv.${c.lv}`:c.desc}</div>
        </div>
        <div class="si-right">
          <div class="si-price">💰${c.cost}</div>
          <div class="si-owned">${G.inv[id]||0}×</div>
        </div>
      </button>`;
    }
    tc.innerHTML = h;
  } else if (G.activeTab === 'contracts') {
    ensureDailyContracts();
    let h = `<div class="tc-label">// daily.contracts()</div>`;
    h += `<div style="font-size:10px;color:var(--t2);margin-bottom:8px">Reputação atual: <span style="color:var(--purple);font-weight:700">${G.reputation || 0}</span> | Bônus de contrato: <span style="color:var(--cyan);font-weight:700">${Math.round((contractRewardMult()-1)*100)}%</span></div>`;
    G.contracts.forEach((contract, index) => {
      const done = contract.progress >= contract.goal;
      const pct = Math.min(100, (contract.progress / contract.goal) * 100);
      h += `<button type="button" class="upgitem${contract.claimed ? ' umaxed' : done ? '' : ' udisabled'}" onclick="${done && !contract.claimed ? `claimContract(${index})` : ''}">
        <div class="uh"><div class="ue">${contract.emoji}</div><div class="un">${contract.name}</div><div class="udots"><div class="dot${done ? ' dfilled' : ''}"></div></div></div>
        <div class="ud">${contract.desc}</div>
        <div style="height:5px;background:var(--bg3);border-radius:999px;overflow:hidden;margin-bottom:6px"><div style="height:100%;width:${pct.toFixed(1)}%;background:linear-gradient(90deg,var(--cyan),var(--purple));border-radius:999px"></div></div>
        <div class="uf">
          <div class="ucost">${contract.progress}/${contract.goal}</div>
          <div class="utag${contract.claimed ? ' umx' : ''}">${contract.claimed ? `CLAIMED` : done ? `CLAIM` : `${contract.rewardTok}💰 +${contract.rewardXp}XP`}</div>
        </div>
      </button>`;
    });
    if (G.contracts.every(c => c.claimed)) {
      h += `<div style="margin-top:8px;padding:8px 10px;border:1px solid var(--green)30;border-radius:6px;background:#001500;font-size:10px;color:var(--green)">Conjunto diário concluído. Volte amanhã para novas metas.</div>`;
    }
    tc.innerHTML = h;
  } else if (G.activeTab === 'upgrades') {
    let h = `<div class="tc-label">// upgrades.buy()</div>`;
    for (const [id,u] of Object.entries(UPGRADES)) {
      const lv = G.upgrades[id]||0;
      const maxed = lv >= u.max;
      const nc = maxed ? null : u.costs[lv];
      const ok = nc !== null && G.tokens >= nc;
      let dots = '';
      for(let i=0;i<u.max;i++) dots+=`<div class="dot${i<lv?' dfilled':''}"></div>`;
      h += `<button type="button" class="upgitem${maxed?' umaxed':ok?'':' udisabled'}" onclick="${maxed?'':`buyUpgrade('${id}')`}">
        <div class="uh"><div class="ue">${u.emoji}</div><div class="un">${u.name}</div><div class="udots">${dots}</div></div>
        <div class="ud">${u.desc}</div>
        <div class="uf">
          <div class="ucost">${maxed?'':nc+' 💰'}</div>
          <div class="utag${maxed?' umx':''}">${maxed?'MAXED ✓':`${lv}/${u.max}`}</div>
        </div>
      </button>`;
    }
    tc.innerHTML = h;
  } else if (G.activeTab === 'stats') {
    const buffs = [
      G.reviewBonus     ? '✅ Code Review: 2× próxima colheita' : null,
      Date.now()<G.refactorUntil ? `♻️ Refactor: 2× crescimento (${fmtT((G.refactorUntil-Date.now())/1000)})` : null,
      G.hackathonBonus  ? '⚡ Hackathon: 1.5× yield + 3× XP' : null,
    ].filter(Boolean);
    tc.innerHTML = `
      <div class="tc-label">// stats.log()</div>
      <div class="statgrid">
        <div class="statcard"><div class="sc-lbl">Colhitas</div><div class="sc-val" style="color:var(--green)">${fmt(G.stats.harvested)}</div></div>
        <div class="statcard"><div class="sc-lbl">Tokens Ganhos</div><div class="sc-val" style="color:var(--yellow)">${fmt(G.stats.earned)}</div></div>
        <div class="statcard"><div class="sc-lbl">Bugs Fixados</div><div class="sc-val" style="color:var(--red)">${G.stats.bugsFixed}</div></div>
        <div class="statcard"><div class="sc-lbl">Plantações</div><div class="sc-val" style="color:var(--cyan)">${G.stats.planted}</div></div>
        <div class="statcard"><div class="sc-lbl">ML Models</div><div class="sc-val" style="color:var(--purple)">${G.stats.mlHarv}</div></div>
        <div class="statcard"><div class="sc-lbl">Nível Atual</div><div class="sc-val" style="color:var(--blue)">${G.level}</div></div>
        <div class="statcard"><div class="sc-lbl">Contratos</div><div class="sc-val" style="color:var(--purple)">${G.stats.contractsClaimed}</div></div>
        <div class="statcard"><div class="sc-lbl">Reputação</div><div class="sc-val" style="color:var(--purple)">${G.reputation || 0}</div></div>
      </div>
      <div class="tc-label">// active.buffs()</div>
      ${buffs.length ? buffs.map(b=>`<div style="font-size:10px;color:var(--t2);margin-bottom:4px">${b}</div>`).join('') : '<div style="font-size:10px;color:var(--t3)">Nenhum buff ativo.</div>'}
    `;
  } else if (G.activeTab === 'badges') {
    let h = `<div class="tc-label">// achievements[] — ${G.achievements.length}/${ACHIEVEMENTS.length}</div>`;
    for (const a of ACHIEVEMENTS) {
      const done = G.achievements.includes(a.id);
      h += `<div class="achv${done?' adone':''}">
        <div class="av-emoji">${a.emoji}</div>
        <div class="av-info"><div class="av-name">${a.name}</div><div class="av-desc">${a.desc}</div></div>
        ${done?'<div class="av-badge">✓</div>':''}
      </div>`;
    }
    tc.innerHTML = h;
  }
}

function renderAll() {
  renderHeader();
  renderFarm();
  renderSeeds();
  renderTab();
}

document.querySelectorAll('.tbtn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('tactive'));
    btn.classList.add('tactive');
    G.activeTab = btn.dataset.t;
    renderTab();
  };
});

let _lastFullRender = 0;

function gameLoop() {
  const now = Date.now();
  let changed = false;

  ensureDailyContracts();

  G.plots.forEach((p, i) => {
    if (p.state === 'growing') {
      const elapsed = (now - p.plantedAt) / 1000;
      const total = effTime(p.crop);
      const prev = p.progress;
      p.progress = Math.min(1, elapsed / total);

      if (p.progress >= 1 && prev < 1) {
        if (autoHarv()) {
          harvest(i, document.querySelector(`[data-pi="${i}"]`));
        } else {
          p.state = 'ready';
        }
        changed = true;
      }
    }
  });

  if (now >= G.nextEvent) {
    triggerEvent();
    G.nextEvent = now + 25000 + Math.random() * 30000;
    changed = true;
  }

  if (changed || now - _lastFullRender > 500) {
    renderAll();
    _lastFullRender = now;
    if (changed) scheduleSave();
  } else {

    renderHeader();
    document.querySelectorAll('.plot.growing').forEach(el => {
      const i = parseInt(el.dataset.pi);
      const p = G.plots[i];
      if (!p || p.state !== 'growing') return;
      const fill = el.querySelector('.pbar-fill');
      const timeEl = el.querySelector('.ptime');
      if (fill) fill.style.width = (p.progress * 100).toFixed(1) + '%';
      if (timeEl) {
        const elapsed = (now - p.plantedAt) / 1000;
        timeEl.textContent = fmtT(Math.max(0, effTime(p.crop) - elapsed));
      }
    });
  }
}

function closeWelcome() {
  $('welcome').style.opacity = '0';
  $('welcome').style.transition = 'opacity .3s';
  setTimeout(() => $('welcome').style.display='none', 300);
}

document.addEventListener('keydown', e => {
  const ids = Object.keys(CROPS);
  const n = parseInt(e.key);
  if (n >= 1 && n <= ids.length) {
    const id = ids[n-1];
    if (unlocked(id)) { G.selectedCrop = id; renderSeeds(); }
  }
  if (e.key === 'c') {
    G.activeTab = 'contracts';
    document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('tactive'));
    const contractsTab = document.querySelector('.tbtn[data-t="contracts"]');
    if (contractsTab) contractsTab.classList.add('tactive');
    renderTab();
  }
  if (e.key === 'h') {
    // Harvest all ready
    G.plots.forEach((p,i)=>{ if(p.state==='ready') harvest(i, document.querySelector(`[data-pi="${i}"]`)); });
    renderAll();
  }
});

function init() {
  load();
  ensureDailyContracts(true);
  renderAll();
  setInterval(gameLoop, 200);
  setInterval(save, 15000);
}

window.addEventListener('beforeunload', flushSave);
window.addEventListener('pagehide', flushSave);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') flushSave();
});

init();
</script>
</body>
</html>
